services:
  - type: web
    name: circulair-platform
    runtime: node
    region: singapore
    plan: starter
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false

      # ── Database ──────────────────────────────────────────────────────────────
      # REQUIRED: Must be a MySQL/TiDB connection string (mysql://...)
      # Render's built-in PostgreSQL is NOT compatible with this app.
      # Recommended free options:
      #   - TiDB Cloud Serverless (free tier): https://tidbcloud.com
      #     Format: mysql://user:pass@host:4000/dbname?ssl-mode=VERIFY_IDENTITY
      #   - PlanetScale (free tier): https://planetscale.com
      #     Format: mysql://user:pass@host/dbname?ssl=true
      - key: DATABASE_URL
        sync: false

      # ── Security ─────────────────────────────────────────────────────────────
      # Auto-generated secure random secret for JWT session signing
      - key: JWT_SECRET
        generateValue: true

      # ── Platform Owner ────────────────────────────────────────────────────────
      # Used for owner notifications and admin bootstrap
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_NAME
        value: Platform Owner

      # ── OpenAI (LLM + Image Generation + Voice Transcription) ─────────────────
      # REQUIRED for AI features: battery SOH prediction, assistant chat, image gen
      # Get your key at: https://platform.openai.com/api-keys
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_IMAGE_MODEL
        value: dall-e-3

      # ── AWS S3 (File Storage) ─────────────────────────────────────────────────
      # REQUIRED for document uploads, EPR reports, battery images
      # Create a free S3 bucket at: https://aws.amazon.com/s3/
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-southeast-1
      - key: AWS_S3_BUCKET
        sync: false

      # ── Google Maps ───────────────────────────────────────────────────────────
      # REQUIRED for logistics tracking, battery location maps
      # Get your key at: https://console.cloud.google.com/google/maps-apis
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false

      # ── Email — ZeptoMail (Primary) ───────────────────────────────────────────
      # REQUIRED for contact form emails, password reset, owner notifications
      # Get your token at: https://www.zoho.com/zeptomail/
      - key: ZEPTOMAIL_TOKEN
        sync: false
      - key: FROM_EMAIL
        value: noreply@circulair.energy

      # ── Email — Resend (Optional fallback) ───────────────────────────────────
      # Only needed if ZeptoMail is not configured
      # Get your key at: https://resend.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@circulair.energy

      # ── Stripe (Payments) ─────────────────────────────────────────────────────
      # REQUIRED for marketplace transactions and subscription billing
      # Get your keys at: https://dashboard.stripe.com/apikeys
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── MQTT (Real-time Battery Telemetry) ────────────────────────────────────
      # REQUIRED for live battery monitoring and IoT device connectivity
      # Use any MQTT broker: HiveMQ Cloud (free), EMQX Cloud, Mosquitto
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TOPIC_PREFIX
        value: CAI_

      # ── App Identity ─────────────────────────────────────────────────────────
      - key: VITE_APP_TITLE
        value: Circul-AI-r Platform

# Render Blueprint — Circul-AI-r Platform
# https://render.com/docs/blueprint-spec
#
# Auto-deploys from the `main` branch of the connected GitHub repo.
# Database: External MySQL/TiDB (not Render PostgreSQL)
# All `sync: false` variables must be configured in the Render dashboard.

services:
  - type: web
    name: circulair-platform
    runtime: node
    region: singapore
    plan: starter
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database (External MySQL/TiDB) ────────────────────────────────────────
      # Format: mysql://user:pass@host:4000/dbname?ssl={"rejectUnauthorized":true}
      - key: DATABASE_URL
        sync: false

      # ── Security ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_BOOTSTRAP_SECRET
        generateValue: true

      # ── Platform Owner ────────────────────────────────────────────────────────
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_NAME
        value: Circul-AI-r Admin

      # ── OpenAI (LLM + Image Generation + Voice Transcription) ─────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_IMAGE_MODEL
        value: dall-e-3

      # ── AWS S3 (File Storage) ─────────────────────────────────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET
        sync: false

      # ── Google Maps ───────────────────────────────────────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false

      # ── Email — ZeptoMail (Primary) ───────────────────────────────────────────
      - key: ZEPTOMAIL_TOKEN
        sync: false
      - key: FROM_EMAIL
        value: noreply@circulair.energy

      # ── Email — Resend (Optional fallback) ───────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@circulair.energy

      # ── Stripe (Payments) ─────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── MQTT (Real-time Battery Telemetry) ────────────────────────────────────
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TOPIC_PREFIX
        value: CAI_

      # ── App Identity ─────────────────────────────────────────────────────────
      - key: VITE_APP_TITLE
        value: Circul-AI-r Platform
